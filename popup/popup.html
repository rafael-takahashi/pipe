<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pipe</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <img src="../icons/pipe-logo.svg" alt="" class="header__logo" width="28" height="28" />
      <h1 class="header__title">pipe</h1>
    </header>

    <main class="filters" id="filters">
      <label class="filter">
        <span class="filter__icon" aria-hidden="true">⚡</span>
        <span class="filter__info">
          <span class="filter__name">Shorts</span>
          <span class="filter__desc">Hide Shorts shelf, sidebar entry, and Shorts in search.</span>
        </span>
        <span class="toggle">
          <input class="toggle__input" type="checkbox" data-key="hideShorts" />
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
        </span>
      </label>

      <label class="filter">
        <span class="filter__icon" aria-hidden="true">🏷️</span>
        <span class="filter__info">
          <span class="filter__name">Title</span>
          <span class="filter__desc">Hide the video title on watch pages.</span>
        </span>
        <span class="toggle">
          <input class="toggle__input" type="checkbox" data-key="hideTitle" />
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
        </span>
      </label>

      <label class="filter">
        <span class="filter__icon" aria-hidden="true">📝</span>
        <span class="filter__info">
          <span class="filter__name">Description</span>
          <span class="filter__desc">Hide the description panel on watch pages.</span>
        </span>
        <span class="toggle">
          <input class="toggle__input" type="checkbox" data-key="hideDescription" />
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
        </span>
      </label>

      <label class="filter">
        <span class="filter__icon" aria-hidden="true">🔔</span>
        <span class="filter__info">
          <span class="filter__name">Notifications</span>
          <span class="filter__desc">Hide the notification bell in the top bar.</span>
        </span>
        <span class="toggle">
          <input class="toggle__input" type="checkbox" data-key="hideNotifications" />
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
        </span>
      </label>

      <label class="filter">
        <span class="filter__icon" aria-hidden="true">💬</span>
        <span class="filter__info">
          <span class="filter__name">Comments</span>
          <span class="filter__desc">Hide the comments section on watch pages.</span>
        </span>
        <span class="toggle">
          <input class="toggle__input" type="checkbox" data-key="hideComments" />
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
        </span>
      </label>

      <label class="filter">
        <span class="filter__icon" aria-hidden="true">🎯</span>
        <span class="filter__info">
          <span class="filter__name">Recommendations</span>
          <span class="filter__desc">Hide the home feed, Up Next sidebar, and nudges.</span>
        </span>
        <span class="toggle">
          <input class="toggle__input" type="checkbox" data-key="hideRecommendations" />
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
        </span>
      </label>

    </main>

    <script src="popup.js"></script>
  </body>
</html>
